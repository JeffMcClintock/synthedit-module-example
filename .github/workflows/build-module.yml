name: Build & Release Module

# Push a version tag (e.g. v1.0.0) to compile the module on Windows + macOS, build
# installers, and publish them to a GitHub Release. Use "Run workflow"
# (workflow_dispatch) to do a dry build without releasing.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Windows: compile the .gmpi with CMake/MSVC, wrap it in an Inno Setup installer.
  # ---------------------------------------------------------------------------
  windows:
    name: Windows · module + installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        shell: powershell
        run: |
          $ref = "${{ github.ref_name }}"
          if ("${{ github.ref_type }}" -eq "tag" -and $ref.StartsWith("v")) { $v = $ref.Substring(1) } else { $v = "0.0.0" }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Building version $v"

      - name: Build module (CMake/MSVC)
        shell: powershell
        run: |
          # First configure downloads the GMPI SDK from GitHub (FetchContent).
          cmake -B build -S . -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          if (-not (Test-Path "build\Gain\Release\Gain.gmpi")) { throw "Gain.gmpi was not built" }

      - name: Build installer (Inno Setup)
        shell: powershell
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found - installing via Chocolatey ..."
            choco install innosetup -y --no-progress
          }
          & $iscc "/DAppVersion=${{ steps.ver.outputs.version }}" "installer\windows\gain.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/out/*.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS: compile a universal (Intel + Apple Silicon) .gmpi, wrap it in a .pkg.
  # ---------------------------------------------------------------------------
  macos:
    name: macOS · module + installer
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve version from tag
        id: ver
        run: |
          REF="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" = "tag" ] && [ "${REF#v}" != "$REF" ]; then V="${REF#v}"; else V="0.0.0"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version $V"

      - name: Build module (CMake, universal)
        run: |
          # CMAKE_OSX_ARCHITECTURES (set in CMakeLists.txt) makes this a universal binary.
          # First configure downloads the GMPI SDK from GitHub (FetchContent).
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          MODULE=$(find build -name "Gain.gmpi" -type d | head -n1 || true)
          test -n "$MODULE" && echo "Built $MODULE"

      - name: Build installer (.pkg)
        run: |
          chmod +x installer/macos/build-pkg.sh
          ./installer/macos/build-pkg.sh "${{ steps.ver.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: installer/macos/out/*.pkg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release: attach both installers to a GitHub Release (tags only).
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [windows, macos]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - run: find dist -type f
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows-installer/*
            dist/macos-installer/*
          generate_release_notes: true
          fail_on_unmatched_files: true
